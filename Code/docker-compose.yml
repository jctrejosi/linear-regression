version: "3.9"

services:
  backend:
    container_name: regresion_backend
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    container_name: regresion_frontend
    build:
      context: ./Frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
