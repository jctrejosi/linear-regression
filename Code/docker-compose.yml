services:
  backend:
    container_name: regresion_backend
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"   # Backend disponible en localhost:5000
    restart: unless-stopped
    networks:
      - appnet

  frontend:
    container_name: regresion_frontend
    build:
      context: ./Frontend
      args:
        VITE_API_BASE_URL: http://backend:5000  # apunta al servicio backend
      dockerfile: Dockerfile
    ports:
      - "3000:80"     # Frontend disponible en localhost:3000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - appnet

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"  # puerto para probar la API de Ollama
    volumes:
      - ollama_data:/root/.ollama
    command: >
      sh -c "ollama serve &
        sleep 5 &&
        ollama pull qwen2.5:3b &&
        wait"
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  ollama_data:
